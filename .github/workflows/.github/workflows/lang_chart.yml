name: Generate Language Graph

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC

jobs:
  analyze-languages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v2

      - name: Generate Language Chart
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          plugin_languages: yes
          plugin_languages_analysis: true
          plugin_languages_ignored: 'html, css'  # Optionally ignore specific languages
          plugin_languages_sections: breakdown
          plugin_languages_colors: "github"  # Set colors to match GitHub

          
          
