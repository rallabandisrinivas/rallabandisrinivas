<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background and Title -->
    <rect width="100%" height="100%" fill="#ffffff"/>
    <text x="50%" y="10%" dominant-baseline="middle" text-anchor="middle" font-size="20" font-family="Arial" fill="#333333">
        Language Distribution
    </text>

    <!-- Pie Chart for Languages -->
    <circle cx="200" cy="200" r="100" fill="white"/>
    <!-- Example Language Slices -->
    <path d="M 200,200 L 200,100 A 100,100 0 0,1 300,200 Z" fill="#3572A5"/> <!-- Python (25%) -->
    <path d="M 200,200 L 300,200 A 100,100 0 0,1 200,300 Z" fill="#f1e05a"/> <!-- JavaScript (25%) -->
    <path d="M 200,200 L 200,300 A 100,100 0 0,1 100,200 Z" fill="#e34c26"/> <!-- HTML (25%) -->
    <path d="M 200,200 L 100,200 A 100,100 0 0,1 200,100 Z" fill="#563d7c"/> <!-- CSS (25%) -->

    <!-- Labels for Languages -->
    <text x="350" y="150" font-size="15" font-family="Arial" fill="#333333">Python - 25%</text>
    <rect x="330" y="138" width="15" height="15" fill="#3572A5"/>
    <text x="350" y="180" font-size="15" font-family="Arial" fill="#333333">JavaScript - 25%</text>
    <rect x="330" y="168" width="15" height="15" fill="#f1e05a"/>
    <text x="350" y="210" font-size="15" font-family="Arial" fill="#333333">HTML - 25%</text>
    <rect x="330" y="198" width="15" height="15" fill="#e34c26"/>
    <text x="350" y="240" font-size="15" font-family="Arial" fill="#333333">CSS - 25%</text>
    <rect x="330" y="228" width="15" height="15" fill="#563d7c"/>
</svg>
